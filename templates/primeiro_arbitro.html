<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1º Árbitro - {{ competicao }}</title>
    <style>
        :root {
            --bg: #07111f;
            --card: rgba(15, 23, 42, .94);
            --card2: rgba(30, 41, 59, .96);
            --text: #f8fafc;
            --muted: #94a3b8;
            --line: rgba(148, 163, 184, .25);
            --accent: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: radial-gradient(circle at top, #123055 0, var(--bg) 55%, #020617 100%);
            color: var(--text);
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        body { touch-action: manipulation; }

        .orientacao {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: #020617;
            color: white;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 28px;
            font-size: 26px;
            font-weight: 950;
            line-height: 1.25;
        }

        .app {
            height: 100vh;
            width: 100vw;
            display: grid;
            grid-template-rows: 54px 1fr;
            gap: 8px;
            padding: 8px;
        }

        .topbar {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 8px;
            background: rgba(2, 6, 23, .62);
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 7px 10px;
            min-height: 0;
        }

        .titulo {
            font-size: 15px;
            font-weight: 950;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .status {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            border-radius: 999px;
            padding: 6px 12px;
            background: rgba(34, 197, 94, .12);
            border: 1px solid rgba(34, 197, 94, .3);
            color: #bbf7d0;
            font-size: 12px;
            font-weight: 900;
        }

        .status.off {
            background: rgba(239, 68, 68, .12);
            border-color: rgba(239, 68, 68, .35);
            color: #fecaca;
        }

        .acoes-topo {
            display: flex;
            justify-content: flex-end;
            gap: 7px;
        }

        button {
            border: 0;
            border-radius: 14px;
            padding: 10px 12px;
            font-size: 13px;
            font-weight: 950;
            color: #0f172a;
            background: #fbbf24;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,.25);
        }

        .main {
            min-height: 0;
            display: grid;
            grid-template-columns: 1fr 230px 1fr;
            gap: 8px;
        }

        .equipe-card, .centro-card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 18px;
            min-height: 0;
            overflow: hidden;
            box-shadow: 0 18px 45px rgba(0,0,0,.28);
        }

        .cabecalho-equipe {
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            padding: 7px 10px;
            background: rgba(15, 23, 42, .9);
            border-bottom: 1px solid var(--line);
        }

        .nome-equipe {
            font-size: 14px;
            font-weight: 950;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .placar-equipe {
            font-size: 23px;
            line-height: 1;
            font-weight: 1000;
            color: #fff;
        }

        .quadra {
            height: calc(100% - 45px);
            padding: 8px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 7px;
        }

        .jogador {
            min-width: 0;
            min-height: 0;
            border-radius: 16px;
            background: linear-gradient(180deg, rgba(30,41,59,.98), rgba(15,23,42,.98));
            border: 1px solid rgba(148, 163, 184, .22);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 5px;
            text-align: center;
        }

        .jogador.sacador {
            outline: 3px solid var(--accent);
            box-shadow: 0 0 0 5px rgba(34,197,94,.14), 0 0 30px rgba(34,197,94,.22);
        }

        .num {
            font-size: clamp(22px, 6vw, 42px);
            font-weight: 1000;
            line-height: .95;
        }

        .nome {
            margin-top: 4px;
            max-width: 100%;
            color: var(--muted);
            font-size: clamp(9px, 1.8vw, 12px);
            font-weight: 850;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }

        .centro-card {
            display: grid;
            grid-template-rows: 1fr 1fr 1fr;
            gap: 7px;
            padding: 8px;
        }

        .mini-card {
            border-radius: 16px;
            background: var(--card2);
            border: 1px solid var(--line);
            padding: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 0;
        }

        .label {
            color: var(--muted);
            font-size: 10px;
            font-weight: 950;
            text-transform: uppercase;
            letter-spacing: .08em;
        }

        .valor {
            margin-top: 4px;
            font-size: 18px;
            line-height: 1.05;
            font-weight: 1000;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .valor.grande { font-size: 31px; }
        .valor.medio { font-size: 20px; }

        .popup {
            position: fixed;
            inset: 10px;
            z-index: 50;
            display: none;
            align-items: center;
            justify-content: center;
            text-align: center;
            border-radius: 24px;
            background: rgba(2, 6, 23, .92);
            border: 2px solid rgba(255,255,255,.15);
            box-shadow: 0 30px 80px rgba(0,0,0,.55);
            padding: 18px;
        }

        .popup.mostrar { display: flex; animation: entrar .15s ease-out; }

        .popup-conteudo { max-width: 92vw; }

        .popup-titulo {
            color: #fde68a;
            font-size: clamp(18px, 3vw, 28px);
            font-weight: 1000;
            text-transform: uppercase;
            letter-spacing: .08em;
        }

        .popup-texto {
            margin-top: 8px;
            font-size: clamp(32px, 9vw, 74px);
            line-height: .98;
            font-weight: 1000;
        }

        .popup-sub {
            margin-top: 8px;
            color: #cbd5e1;
            font-size: clamp(14px, 2.5vw, 23px);
            font-weight: 850;
        }

        @keyframes entrar {
            from { transform: scale(.98); opacity: .45; }
            to { transform: scale(1); opacity: 1; }
        }

        @media (orientation: portrait) {
            .orientacao { display: flex; }
            .app { display: none; }
        }

        @media (max-height: 430px) {
            .app { grid-template-rows: 48px 1fr; padding: 6px; gap: 6px; }
            .main { grid-template-columns: 1fr 205px 1fr; gap: 6px; }
            .topbar { border-radius: 14px; padding: 5px 8px; }
            .cabecalho-equipe { height: 38px; padding: 5px 8px; }
            .quadra { height: calc(100% - 38px); gap: 5px; padding: 6px; }
            .jogador { border-radius: 13px; }
            .centro-card { gap: 5px; padding: 6px; }
            .mini-card { border-radius: 13px; padding: 6px; }
            button { padding: 8px 10px; }
            .valor.grande { font-size: 27px; }
        }
    </style>
</head>
<body>
    <div class="orientacao">📱 Vire o celular para a horizontal<br><span style="font-size:16px;color:#94a3b8;margin-top:10px;display:block;">Tela do 1º árbitro</span></div>

    <div class="app">
        <header class="topbar">
            <div class="titulo">1º Árbitro • {{ competicao }}</div>
            <div id="statusSocket" class="status off">● Conectando</div>
            <div class="acoes-topo">
                <button type="button" onclick="inverterQuadra()">🔄 Inverter</button>
                <button type="button" onclick="carregarEstado(true)">↻</button>
            </div>
        </header>

        <main class="main">
            <section class="equipe-card" id="cardA">
                <div class="cabecalho-equipe">
                    <div class="nome-equipe" id="nomeA">{{ estado.equipe_a }}</div>
                    <div class="placar-equipe" id="placarA">{{ estado.pontos_a }}</div>
                </div>
                <div class="quadra" id="quadraA"></div>
            </section>

            <aside class="centro-card">
                <div class="mini-card">
                    <div class="label">Sacador atual</div>
                    <div class="valor grande" id="sacadorNumero">-</div>
                    <div class="valor medio" id="sacadorNome">Aguardando</div>
                </div>
                <div class="mini-card">
                    <div class="label">Placar</div>
                    <div class="valor grande"><span id="centroPlacarA">0</span> x <span id="centroPlacarB">0</span></div>
                    <div class="valor medio">Set <span id="setAtual">1</span></div>
                </div>
                <div class="mini-card">
                    <div class="label">Última ação</div>
                    <div class="valor medio" id="ultimaAcao">-</div>
                </div>
            </aside>

            <section class="equipe-card" id="cardB">
                <div class="cabecalho-equipe">
                    <div class="nome-equipe" id="nomeB">{{ estado.equipe_b }}</div>
                    <div class="placar-equipe" id="placarB">{{ estado.pontos_b }}</div>
                </div>
                <div class="quadra" id="quadraB"></div>
            </section>
        </main>
    </div>

    <div id="popup" class="popup">
        <div class="popup-conteudo">
            <div id="popupTitulo" class="popup-titulo"></div>
            <div id="popupTexto" class="popup-texto"></div>
            <div id="popupSub" class="popup-sub"></div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
        const PARTIDA_ID = {{ partida_id }};
        const COMPETICAO = {{ competicao|tojson }};
        const ESTADO_INICIAL = {{ estado|tojson }};
        const URL_ESTADO_BASE = {{ url_for('oficiais.estado_arbitro_view', competicao=competicao, partida_id=partida_id)|tojson }};

        let estadoAtual = ESTADO_INICIAL || {};
        let invertido = false;
        let ultimoSaqueChave = "";
        let ultimaAcaoTexto = "";
        let popupTimer = null;
        let socket = null;
        let pollingRapido = null;
        let ultimaBuscaMs = 0;

        function agoraMs() {
            return Date.now ? Date.now() : new Date().getTime();
        }

        function montarUrlEstado() {
            const sep = URL_ESTADO_BASE.includes("?") ? "&" : "?";
            return `${URL_ESTADO_BASE}${sep}mobile=1&t=${agoraMs()}`;
        }

        function normalizarJogador(j) {
            if (j && typeof j === "object") {
                return { numero: String(j.numero || j.camisa || "").trim(), nome: String(j.nome || "").trim() };
            }
            return { numero: String(j || "").trim(), nome: "" };
        }

        function nomeEquipe(lado) {
            return lado === "A" ? (estadoAtual.equipe_a || "Equipe A") : (estadoAtual.equipe_b || "Equipe B");
        }

        function rotacao(lado) {
            const lista = lado === "A" ? (estadoAtual.rotacao_a || []) : (estadoAtual.rotacao_b || []);
            const normalizada = Array.isArray(lista) ? lista.map(normalizarJogador).slice(0, 6) : [];
            while (normalizada.length < 6) normalizada.push({ numero: "", nome: "" });
            return normalizada;
        }

        function sacadorAtual() {
            const lado = String(estadoAtual.saque_atual || "").toUpperCase();
            if (!["A", "B"].includes(lado)) return { lado: "", equipe: "", numero: "-", nome: "Aguardando" };
            const r = rotacao(lado);
            const jogador = r[5] || r.find(x => x.numero) || { numero: "-", nome: "" };
            return { lado, equipe: nomeEquipe(lado), numero: jogador.numero || "-", nome: jogador.nome || "" };
        }

        function renderQuadra(containerId, lado) {
            const el = document.getElementById(containerId);
            if (!el) return;
            const saque = sacadorAtual();
            el.innerHTML = rotacao(lado).map((j, idx) => {
                const ehSacador = saque.lado === lado && idx === 5;
                return `
                    <div class="jogador ${ehSacador ? 'sacador' : ''}">
                        <div class="num">${j.numero || '-'}</div>
                        <div class="nome">${j.nome || '&nbsp;'}</div>
                    </div>
                `;
            }).join("");
        }

        function render() {
            const ladoEsq = invertido ? "B" : "A";
            const ladoDir = invertido ? "A" : "B";

            document.getElementById("nomeA").textContent = nomeEquipe(ladoEsq);
            document.getElementById("nomeB").textContent = nomeEquipe(ladoDir);
            document.getElementById("placarA").textContent = ladoEsq === "A" ? (estadoAtual.pontos_a || 0) : (estadoAtual.pontos_b || 0);
            document.getElementById("placarB").textContent = ladoDir === "A" ? (estadoAtual.pontos_a || 0) : (estadoAtual.pontos_b || 0);
            document.getElementById("centroPlacarA").textContent = estadoAtual.pontos_a || 0;
            document.getElementById("centroPlacarB").textContent = estadoAtual.pontos_b || 0;
            document.getElementById("setAtual").textContent = estadoAtual.set_atual || 1;
            document.getElementById("ultimaAcao").textContent = estadoAtual.ultima_acao || "-";

            const s = sacadorAtual();
            document.getElementById("sacadorNumero").textContent = s.numero || "-";
            document.getElementById("sacadorNome").textContent = s.nome ? `${s.nome} • ${s.equipe}` : (s.equipe || "Aguardando");

            renderQuadra("quadraA", ladoEsq);
            renderQuadra("quadraB", ladoDir);
        }

        function mostrarPopup(titulo, texto, sub, ms = 3300) {
            const popup = document.getElementById("popup");
            document.getElementById("popupTitulo").textContent = titulo || "";
            document.getElementById("popupTexto").textContent = texto || "";
            document.getElementById("popupSub").textContent = sub || "";
            popup.classList.add("mostrar");
            if (popupTimer) clearTimeout(popupTimer);
            popupTimer = setTimeout(() => popup.classList.remove("mostrar"), ms);
        }

        function inverterQuadra() {
            invertido = !invertido;
            render();
        }

        function payloadDaPartida(dados) {
            if (!dados || typeof dados !== "object") return false;
            if (dados.partida_id == null && dados.id_partida == null) return true;
            const id = dados.partida_id != null ? dados.partida_id : dados.id_partida;
            return String(id) === String(PARTIDA_ID);
        }

        function limparPayloadParcial(dados) {
            const seguro = { ...dados };

            // Eventos parciais de socket não podem apagar rotação/saque que já está na tela.
            if (Array.isArray(seguro.rotacao_a) && seguro.rotacao_a.length === 0 && Array.isArray(estadoAtual.rotacao_a) && estadoAtual.rotacao_a.length) delete seguro.rotacao_a;
            if (Array.isArray(seguro.rotacao_b) && seguro.rotacao_b.length === 0 && Array.isArray(estadoAtual.rotacao_b) && estadoAtual.rotacao_b.length) delete seguro.rotacao_b;
            if ((seguro.saque_atual === "" || seguro.saque_atual == null) && estadoAtual.saque_atual) delete seguro.saque_atual;

            return seguro;
        }

        function aplicarEstado(dados, silencioso = false) {
            if (!payloadDaPartida(dados)) return;

            const seguro = limparPayloadParcial(dados);
            estadoAtual = { ...estadoAtual, ...seguro };
            render();

            const s = sacadorAtual();
            const chaveSaque = `${s.lado}|${s.numero}|${s.nome}|${estadoAtual.pontos_a}|${estadoAtual.pontos_b}`;
            if (!silencioso && s.lado && chaveSaque !== ultimoSaqueChave) {
                ultimoSaqueChave = chaveSaque;
                mostrarPopup("Saque", `#${s.numero}`, `${s.nome ? s.nome + ' • ' : ''}${s.equipe}`, 2600);
            }

            const acao = String(estadoAtual.ultima_acao || "").trim();
            if (!silencioso && acao && acao !== "-" && acao !== ultimaAcaoTexto) {
                ultimaAcaoTexto = acao;
                mostrarPopup("Última ação", acao, "", 2400);
            }
        }

        async function carregarEstado(silencioso = false, forcar = false) {
            const agora = agoraMs();
            if (!forcar && agora - ultimaBuscaMs < 700) return;
            ultimaBuscaMs = agora;

            try {
                const resp = await fetch(montarUrlEstado(), {
                    method: "GET",
                    cache: "no-store",
                    credentials: "same-origin",
                    headers: {
                        "Cache-Control": "no-cache, no-store, must-revalidate",
                        "Pragma": "no-cache",
                        "Expires": "0",
                        "X-Mobile-Arbitro": "1"
                    }
                });

                if (!resp.ok) return;

                const dados = await resp.json();
                if (dados && dados.ok) aplicarEstado(dados, silencioso);
                else if (dados && typeof dados === "object") aplicarEstado(dados, silencioso);
            } catch (e) {}
        }

        function setSocketStatus(ok) {
            const el = document.getElementById("statusSocket");
            el.classList.toggle("off", !ok);
            el.textContent = ok ? "● Ao vivo" : "● Reconectando";
        }

        function entrarNaSala() {
            if (!socket || !socket.connected) return;

            const payload = {
                partida_id: PARTIDA_ID,
                competicao: COMPETICAO,
                tela: "arbitro",
                mobile: true
            };

            socket.emit("entrar_arbitro", payload);
            socket.emit("entrar_partida", payload);
            socket.emit("join_partida", payload);
        }

        function tratarSolicitacaoArbitros(dados) {
            if (!payloadDaPartida(dados)) return;
            const ehTempo = String(dados.tipo || "").toLowerCase() === "tempo";
            const tipo = ehTempo ? "Pedido de tempo" : "Pedido de substituição";
            mostrarPopup(tipo, dados.equipe_nome || `Equipe ${dados.equipe || ''}`, dados.mensagem || "Solicitação do treinador", 3600);
            carregarEstado(true, true);
        }

        function iniciarSocket() {
            if (typeof io !== "function") {
                setSocketStatus(false);
                iniciarPollingRapido();
                return;
            }

            socket = io({
                transports: ["websocket", "polling"],
                upgrade: true,
                reconnection: true,
                reconnectionAttempts: Infinity,
                reconnectionDelay: 250,
                reconnectionDelayMax: 1500,
                timeout: 4500,
                forceNew: true,
                autoConnect: true
            });

            socket.on("connect", () => {
                setSocketStatus(true);
                entrarNaSala();
                carregarEstado(true, true);
            });

            socket.on("disconnect", () => {
                setSocketStatus(false);
            });

            socket.on("connect_error", () => {
                setSocketStatus(false);
                carregarEstado(true, true);
            });

            socket.on("reconnect", () => {
                setSocketStatus(true);
                entrarNaSala();
                carregarEstado(true, true);
            });

            [
                "estado_arbitros",
                "estado_partida",
                "estado_jogo_atualizado",
                "placar_atualizado",
                "placar_apontador",
                "atualizar_placar",
                "ponto_registrado"
            ].forEach(evt => {
                socket.on(evt, dados => {
                    aplicarEstado(dados);
                    // No celular, confirma com uma busca leve para evitar pacote perdido/atrasado.
                    setTimeout(() => carregarEstado(true, true), 250);
                });
            });

            socket.on("saque_arbitros", dados => {
                if (!payloadDaPartida(dados)) return;
                aplicarEstado(dados, true);
                const s = sacadorAtual();
                if (s.lado) mostrarPopup("Saque", `#${s.numero}`, `${s.nome ? s.nome + ' • ' : ''}${s.equipe}`, 2600);
            });

            socket.on("ultima_acao_arbitros", dados => {
                if (!payloadDaPartida(dados)) return;
                const texto = String(dados.texto || dados.descricao || dados.ultima_acao || "").trim();
                if (texto) {
                    estadoAtual = { ...estadoAtual, ultima_acao: texto };
                    render();
                    mostrarPopup("Última ação", texto, "", 2400);
                }
            });

            socket.on("solicitacao_arbitros", tratarSolicitacaoArbitros);
            socket.on("notificacao_geral", tratarSolicitacaoArbitros);
            socket.on("tempo_solicitado", tratarSolicitacaoArbitros);
            socket.on("substituicao_solicitada", tratarSolicitacaoArbitros);
        }

            iniciarPollingRapido();
        }

        function iniciarPollingRapido() {
            if (pollingRapido) clearInterval(pollingRapido);

            pollingRapido = setInterval(() => {
                // O celular às vezes atrasa socket mesmo conectado; esse fallback é leve e sem cache.
                if (document.visibilityState === "visible") {
                    carregarEstado(true, false);
                }
            }, 2000);
        }

        document.addEventListener("visibilitychange", () => {
            if (document.visibilityState === "visible") {
                if (socket) socket.connect();
                entrarNaSala();
                carregarEstado(true, true);
            }
        });

        window.addEventListener("focus", () => {
            if (socket) socket.connect();
            entrarNaSala();
            carregarEstado(true, true);
        });

        window.addEventListener("online", () => {
            if (socket) socket.connect();
            entrarNaSala();
            carregarEstado(true, true);
        });

        window.addEventListener("pageshow", () => {
            if (socket) socket.connect();
            entrarNaSala();
            carregarEstado(true, true);
        });

        aplicarEstado(ESTADO_INICIAL, true);
        carregarEstado(true, true);
        iniciarSocket();
    </script>
</body>
</html>
