{% extends "base.html" %}

{% block titulo %}Novo Árbitro{% endblock %}

{% block conteudo %}
<div class="topo-secao">
    <div class="titulo-secao">Novo Árbitro</div>
</div>

<div class="card-painel" style="max-width: 700px;">
    <form method="post">
        <div style="margin-bottom: 16px;">
            <label for="nome">Nome do árbitro</label>
            <input type="text" id="nome" name="nome" required>
        </div>

        <div style="display:flex; gap:12px; flex-wrap:wrap;">
            <button class="btn-padrao" type="submit">Criar árbitro</button>
            <a class="btn-secundario" href="{{ url_for('arbitros.listar_arbitros') }}">Voltar</a>
        </div>
    </form>
</div>
{% endblock %}
